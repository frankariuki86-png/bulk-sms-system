name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  # Frontend tests and linting
  frontend:
    name: Frontend - Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint 2>/dev/null || echo "No lint config found"

      - name: Run tests
        run: npm test 2>/dev/null || echo "No test script defined"

      - name: Build for production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  # Worker tests and linting
  worker:
    name: Worker - Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./worker

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint 2>/dev/null || echo "No lint config found"

      - name: Run tests
        run: npm test 2>/dev/null || echo "No test script defined"

  # Security checks
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run npm audit (frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (worker)
        working-directory: ./worker
        run: npm audit --audit-level=moderate || true

      - name: Check for hardcoded secrets
        run: |
          if grep -r "SUPABASE_SERVICE_ROLE_KEY\|AFRICAS_TALKING_API_KEY" frontend/src/ --include="*.js" --include="*.jsx"; then
            echo "ERROR: Sensitive keys found in source code!"
            exit 1
          fi
          echo "✓ No hardcoded secrets found"

  # Deploy to staging (on merge to develop)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [frontend, worker, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

      - name: Deploy frontend to staging
        # Replace with your actual hosting deploy command
        # e.g., Vercel, Netlify, Firebase, AWS S3, etc.
        run: echo "Deploy frontend to staging"

      - name: Notify deployment
        if: success()
        run: echo "✓ Staging deployment successful"

      - name: Notify failure
        if: failure()
        run: echo "✗ Staging deployment failed"

  # Deploy to production (on merge to main)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend, worker, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy frontend to production
        # Replace with your actual hosting deploy command
        run: echo "Deploy frontend to production"

      - name: Run Supabase migrations
        run: |
          # Install Supabase CLI
          npm install -g supabase
          # Apply migrations
          supabase migration up --project-id ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Notify deployment
        if: success()
        run: echo "✓ Production deployment successful"

      - name: Notify failure
        if: failure()
        run: echo "✗ Production deployment failed"
